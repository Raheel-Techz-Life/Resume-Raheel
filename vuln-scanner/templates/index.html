<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vulnerability Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
  <div class="bg-gray-800 p-10 rounded-2xl shadow-lg w-96">
    <h1 class="text-2xl font-bold mb-6 text-center">🔍 Vulnerability Scanner</h1>
    <form method="POST" class="flex flex-col space-y-4">
      <input type="text" name="url" placeholder="Enter website (e.g. example.com)"
             class="p-3 rounded-lg text-black focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button type="submit" 
              class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg font-semibold">
        Scan Website
      </button>
    </form>
  </div>
</body>
</html>
