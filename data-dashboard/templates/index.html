<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Data Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
  <div class="bg-gray-800 p-10 rounded-2xl shadow-lg w-[500px] text-center">
    <h1 class="text-2xl font-bold mb-6">📊 Upload CSV for Dashboard</h1>
    <form method="POST" enctype="multipart/form-data" class="space-y-4">
      <input type="file" name="file" accept=".csv"
             class="block w-full text-sm text-gray-300 file:mr-4 file:py-2 file:px-4
                    file:rounded-lg file:border-0 file:text-sm file:font-semibold
                    file:bg-blue-600 file:text-white hover:file:bg-blue-700">
      <button type="submit"
              class="bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-lg font-semibold">
        Upload & View Dashboard
      </button>
    </form>
  </div>
</body>
</html>
